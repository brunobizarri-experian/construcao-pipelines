name: Pipeline Calculadora WEB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  D_USERNAME: brunobizarriexperian

jobs:
  unit_tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade PIP
        run: python -m pip install --upgrade pip
      
      - name: Install Poetry
        run: pip install poetry
          
      - name: Install PyTest
        run: pip install pytest-flask
          
      - name: Install Calculadora WEB
        run: poetry install --no-interaction --no-ansi
      
      - name: Run tests
        run: poetry run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}


  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: f26f9487acbdaee3889497d3b6762f2746a652aa


  build:
    name: Build and Publish Docker Image
    needs: 
      - unit_tests
      - sonarcloud
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name:
        run: |
          echo "USER= $D_USERNAME"
          echo "PAT= ${{ secrets.DOCKERHUB_PAT }}"
      
      - name: Login no Docker Hub Shell
        run: |
          echo "${{ secrets.DOCKERHUB_PAT }}" | docker login \
          -u "$D_USERNAME" \
          --password-stdin

      - name: Build da imagem Docker
        run: |
          docker build -t $D_USERNAME/calculadora-web:latest .
          docker build -t $D_USERNAME/calculadora-web:${{ github.sha }} .

      - name: Push da imagem para o Docker Hub
        run: |
          docker push $D_USERNAME/calculadora-web:latest
          docker push $D_USERNAME/calculadora-web:${{ github.sha }}

  deploy:
      name: Deploy na OCI
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: Configurar SSH
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts

        - name: Deploy via SSH
          run: |
            ssh ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'EOF'
              docker login -u ${D_USERNAME} -p ${{ secrets.DOCKERHUB_PAT }}
              docker pull ${D_USERNAME}/calculadora-web:latest

              docker stop calculadora-web || true
              docker rm calculadora-web || true

              docker run -d \
                --name calculadora-web \
                -p 80:5000 \
                --restart always \
                ${D_USERNAME}/calculadora-web:latest
            EOF