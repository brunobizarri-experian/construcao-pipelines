name: Pipeline Calculadora WEB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  D_USERNAME: brunobizarriexperian

jobs:
  unit_tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade PIP
        run: python -m pip install --upgrade pip
      
      - name: Install Poetry
        run: pip install poetry
          
      - name: Install PyTest
        run: pip install pytest-flask
          
      - name: Install Calculadora WEB
        run: poetry install --no-interaction --no-ansi
      
      - name: Run tests
        run: poetry run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}


  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: f26f9487acbdaee3889497d3b6762f2746a652aa


  build:
    name: Build and Publish Docker Image
    needs: 
      - unit_tests
      - sonarcloud
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name:
        run: |
          echo "USER= $D_USERNAME"
          echo "PAT= ${{ secrets.DOCKERHUB_PAT }}"
      
      - name: Login no Docker Hub Shell
        run: |
          echo "${{ secrets.DOCKERHUB_PAT }}" | docker login \
          -u "$D_USERNAME" \
          --password-stdin

      # - name: Login no Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: $D_USERNAME
      #     password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            $D_USERNAME/calculadora-web:${{ github.sha }}
            $D_USERNAME/calculadora-web:latest