name: Pipeline Calculadora WEB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  D_USERNAME: brunobizarriexperian

jobs:
  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade PIP
        run: python -m pip install --upgrade pip
      
      - name: Install Poetry
        run: pip install poetry
          
      - name: Install PyTest
        run: pip install pytest-flask
          
      - name: Install Calculadora WEB
        run: poetry install --no-interaction --no-ansi
      
      - name: Run tests
        run: poetry run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}


  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: f26f9487acbdaee3889497d3b6762f2746a652aa

  codeql:
    needs:
      - sonarcloud
      - integration_tests
    name: Scan SAST - CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  bandit:
    name: Scan SAST - Bandit (Python)
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r . -ll

  dependency_check:
    name: Scan SAST - Dependency Check
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "calculadora-web"
          path: "."
          format: "HTML"

  build:
    name: Build and Publish Docker Image
    needs: 
      - codeql
      - bandit
      - dependency_check
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name:
        run: |
          echo "USER= $D_USERNAME"
          echo "PAT= ${{ secrets.DOCKERHUB_PAT }}"
      
      - name: Login no Docker Hub Shell
        run: |
          echo "${{ secrets.DOCKERHUB_PAT }}" | docker login \
          -u "$D_USERNAME" \
          --password-stdin

      - name: Build da imagem Docker
        run: |
          docker build -t $D_USERNAME/calculadora-web:latest .
          docker build -t $D_USERNAME/calculadora-web:${{ github.sha }} .

      - name: Push da imagem para o Docker Hub
        run: |
          docker push $D_USERNAME/calculadora-web:latest
          docker push $D_USERNAME/calculadora-web:${{ github.sha }}

  deploy:
      name: Deploy na OCI
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: Configurar SSH
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.OCI_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts


        - name: Deploy via SSH
          env:
            IMAGE_NAME: brunobizarriexperian/calculadora-web:latest
            DOCKERHUB_USER: brunobizarriexperian
            DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
          run: |
            ssh -o StrictHostKeyChecking=no \
                ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << EOF

              echo "Logando no Docker Hub..."
              echo "${DOCKERHUB_PAT}" | docker login -u "${DOCKERHUB_USER}" --password-stdin

              echo "Pull da imagem..."
              docker pull ${IMAGE_NAME}

              echo "Parando container antigo..."
              docker stop calculadora-web || true
              docker rm calculadora-web || true

              echo "Subindo novo container..."
              docker run -d \
                --name calculadora-web \
                -p 80:5000 \
                --restart always \
                ${IMAGE_NAME}
            EOF

  e2e-tests:
      needs: deploy
      name: End To End Tests (Pós Deploy)
      runs-on: ubuntu-latest

      steps:
        - name: Checkout do código
          uses: actions/checkout@v4

        - name: Configurar Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.14"

        - name: Upgrade PIP
          run: python -m pip install --upgrade pip
        
        - name: Install dependencies
          run: |
            pip install pytest playwright
            playwright install chromium
        
        - name: Run Playwright E2E tests
          env:
            APP_BASE_URL: http://${{ secrets.OCI_HOST }}
          run: |
            pytest e2e